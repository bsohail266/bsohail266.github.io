<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | BodyInWhite</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 80px;
            margin: 0;
            color: #0056b3; /* Or your brand color */
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .btn {
            text-decoration: none;
            background-color: #0056b3;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been moved, deleted, or perhaps it never existed. Let's get you back on track.</p>
        <a href="https://bodyinwhite.in/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
